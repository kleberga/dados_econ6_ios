workflows:
  default:
    name: Default Workflow
    environment:
      groups:
        - default
      vars:
        BUNDLE_ID: "com.dadoseconomicos6.app"
    scripts:
      - name: Set up code signing
        script: |
          # 1. inicializa o keychain que o codemagic vai usar
          keychain initialize
          
          # 2. adiciona os arquivos que voce subiu manualmente para o keychain
          keychain add-certificates
          
      - name: Build Flutter app
        script: |
            flutter build ios --release
            xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner --archive-flags "allowProvisioningUpdates"

