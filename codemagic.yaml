workflows:
  default:
    name: Default Workflow
    environment:
      groups:
        - default
      vars:
        BUNDLE_ID: "com.dadoseconomicos6.app"
    scripts:
      - name: Set up code signing
        script: |
            keychain initialize
            keychain add-certificates
            xcode-project use-profiles
      - name: Build Flutter app
        script: |
            flutter build ios --release --no-codesign
            xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner --archive-flags "-allowProvisioningUpdates"

